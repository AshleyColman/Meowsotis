<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Meovvsotis 3D Artist</title>
    <link rel="icon" type="image/png" href="assets/images/icons/profile.webp"/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="home-container w-100 h-100">
    <div id="tsparticles" class="static-border"></div>
    <div class="tilted-border"></div>

    <div id="nav-switch"></div>

    <header id="header">
        <div class="header-container">
            <img class="header-logo no-select" src="assets/images/icons/logo.webp" alt="meovvsotis 3d artist logo"/>
            <nav id="nav">
                <ul class="nav-menu">
                    <li class="nav-item no-select">
                        <p class="nav-item-text no-select">Home</p>
                    </li>
                    <li class="nav-item no-select">
                        <p class="nav-item-text no-select">Commissions</p>
                    </li>
                    <li class="nav-item no-select">
                        <p class="nav-item-text no-select">Portfolio</p>
                    </li>
                    <li class="nav-item no-select">
                        <p class="nav-item-text no-select">Downloads</p>
                    </li>
                    <li class="nav-item no-select">
                        <p class="nav-item-text no-select">Terms of Use</p>
                    </li>
                    <li class="nav-item no-select">
                        <p class="nav-item-text no-select">Contact</p>
                    </li>
                </ul>
            </nav>
        </div>

    </header>
    

    <!-- Mobile Shapes -->
    <img class="square1 white-shadow" src="assets/images/shapes/purple-square.webp" alt="purple square"/>
    <img class="circle1 white-shadow" src="assets/images/shapes/pink-circle.webp" alt="pink circle"/>
    <img class="dots1" src="assets/images/shapes/purple-dots.webp" alt="dots"/>
    <img class="square3 white-shadow" src="assets/images/shapes/blue-square.webp" alt="blue square"/>
    <img class="triangle3 white-shadow" src="assets/images/shapes/pink-triangle.webp" alt="pink triangle"/>
    <img class="circle6 white-shadow" src="assets/images/shapes/blue-circle.webp" alt="blue circle"/>
    <img class="square2 white-shadow" src="assets/images/shapes/pink-square.webp" alt="pink square"/>
    <img class="circle3 white-shadow" src="assets/images/shapes/blue-circle.webp" alt="blue circle"/>

    <!-- Additional Desktop Shapes -->
    <img class="triangle1 white-shadow" src="assets/images/shapes/blue-triangle.webp" alt="blue triangle"/>
    <img class="square5 white-shadow" src="assets/images/shapes/purple-square.webp" alt="purple square"/>
    <img class="circle5 white-shadow" src="assets/images/shapes/purple-circle.webp" alt="purple circle"/>
    <img class="square4 white-shadow" src="assets/images/shapes/pink-square.webp" alt="pink square"/>
    <img class="triangle2 white-shadow" src="assets/images/shapes/blue-triangle.webp" alt="blue triangle"/>
    <img class="circle4 white-shadow" src="assets/images/shapes/purple-circle.webp" alt="purple circle"/>
    <img class="circle2 white-shadow" src="assets/images/shapes/blue-circle.webp" alt="blue circle"/>

    <div class="pattern-cover"></div>

    <div class="home-content">
        <div class="home-content-left">
            <div id="models-container">
                <img class="models-image mobile-only no-select" src="assets/images/models/char1.webp" alt=""/>
                <img class="models-image mobile-only no-select" src="assets/images/models/char5.webp" alt=""/>
                <img class="models-image mobile-only no-select" src="assets/images/models/char4.webp" alt=""/>
            </div>
        </div>
        
        <div class="home-content-right">
            <div class="title-container">
                <img class="flower no-select" src="assets/images/shapes/grey-flower.webp" alt="flower"/>
                <h1 class="title no-select">Meovvsotis</h1>
                <h2 class="subtitle no-select">3D Artist</h2>
                <a class="vgen-link no-select" href="https://vgen.co/Meovvsotis" target="_blank" rel="noopener noreferrer">
                    <img class="vgen-image" src="assets/images/icons/vgen.webp" alt="Commission me on v-gen!"/>
                </a>
            </div>

            <div class="social-media-container">
                <div class="social-group">
                    <a href="https://www.deviantart.com/meovvsotis"><i
                            class="fa-brands fa-deviantart social-media-icon hover-pink"></i></a>
                    <span class="social-handle no-select">@MEOVVSOTIS</span>
                </div>
                <div class="social-group">
                    <a href="https://x.com/Meovvsotis"><i class="fa-brands fa-x-twitter social-media-icon hover-purple"></i></a>
                    <span class="social-handle no-select">@MEOVVSOTIS</span>
                </div>
                <div class="social-group">
                    <a href="https://ko-fi.com/meovvsotis"><i class="fa-solid fa-heart social-media-icon hover-blue"></i></a>
                    <span class="social-handle no-select">@MEOVVSOTIS</span>
                </div>
            </div>
        </div>
        
    </div>
    


    <script src="https://cdn.jsdelivr.net/npm/tsparticles-slim@2.0.6/tsparticles.slim.bundle.min.js"></script>
    <script type="application/javascript" src="js/tsparticles-settings.js"></script>
    <script type="application/javascript" src="js/home.js"></script>
    <script type="application/javascript" src="js/nav.js"></script>
    <script src="https://kit.fontawesome.com/142b4f2a8b.js" crossorigin="anonymous"></script>
</div>
</body>
</html>
